name: Flutter CD (Release)

# Trigger this workflow only when a version tag is pushed
on:
  push:
    tags:
      - "v*" # Matches tags like v1.0.0, v2.1, etc.

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    # Optional: ensure Node 24 is used to prevent deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # These permissions are required for the GitHub Release action
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Java (required for Android builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the securely stored keystore into the android/app directory
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Build the release APK, passing the secrets as environment variables
      - name: Build APK
        run: flutter build apk --release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      # Build the App Bundle, passing the secrets as environment variables
      - name: Build App Bundle
        run: flutter build appbundle --release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      # Upload the compiled APK and App Bundle to a new GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
